name: Daily Kids Shorts

on:
  schedule:
    # 03:00 UTC (an hour after the main video). Makes 2 shorts that publish
    # at the two different times set in config (SHORT_PUBLISH_HOURS).
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  make-and-upload-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Make and upload two shorts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
        run: python scripts/main_shorts.py

      - name: Save progress (which shorts are next)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add shorts_state.json
          git commit -m "Advance shorts [skip ci]" || echo "No change to commit"
          git push
