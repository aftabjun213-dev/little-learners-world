name: Daily Kids Video

on:
  schedule:
    # 02:23 UTC nightly. Off-peak minute: GitHub's scheduler often skips or
    # heavily delays jobs set at :00, which cost us a day's upload once.
    - cron: "23 2 * * *"
  workflow_dispatch: {}   # lets you also run it manually with one click

permissions:
  contents: write          # needed to save progress (state.json) back to the repo

# Never run two video builds at once (a late-firing schedule + a manual run
# would both build the same episode). Extra runs wait their turn instead.
concurrency:
  group: daily-video
  cancel-in-progress: false

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    # Generous ceiling: HD encode + ElevenLabs voices + Flux images legitimately
    # need ~35 min. Runaway length is impossible (video is hard-capped with -t),
    # so this is only a backstop against a truly hung job.
    timeout-minutes: 70
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Make and upload today's video
        env:
          PYTHONUNBUFFERED: "1"   # show progress live in the log
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TIMEZONE: ${{ vars.TIMEZONE }}
        run: python scripts/main.py

      - name: Save progress (which episode is next)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git commit -m "Advance to next episode [skip ci]" || echo "No change to commit"
          git pull --rebase --autostash origin main || true
          git push || (git pull --rebase --autostash origin main && git push) || echo "push skipped"
